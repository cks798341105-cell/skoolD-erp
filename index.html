<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>스쿨디 업무관리</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#0d3f7a;--blue:#1a5fa8;--blue-lt:#e8f2fc;
  --green:#059669;--green-lt:#d1fae5;
  --red:#dc2626;--red-lt:#fee2e2;
  --amber:#d97706;--amber-lt:#fef3c7;
  --border:#e2e5ea;--bg:#f0f2f6;--white:#fff;--text:#111827;--sub:#6b7280;
  --s0:#9ca3af;--s1:#3b82f6;--s2:#f59e0b;--s3:#8b5cf6;--s4:#10b981;--s5:#ef4444;--s6:#06b6d4;
  --c인쇄:#1a5fa8;--c인테리어:#059669;--c사인물:#d97706;--c행사:#dc2626;
  --bg인쇄:#e8f2fc;--bg인테리어:#d1fae5;--bg사인물:#fef3c7;--bg행사:#fee2e2;
}
html,body{height:100%;font-family:'Apple SD Gothic Neo','Malgun Gothic','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);font-size:14px;overflow:hidden}

/* ── 상단 탭바 ── */
.topbar{position:fixed;top:0;left:0;right:0;z-index:60;height:54px;background:#0a2236;display:flex;align-items:center;padding:0 4px;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.topbar-logo{padding:0 12px 0 8px;color:#fff;font-size:15px;font-weight:700;letter-spacing:.5px;white-space:nowrap;flex-shrink:0;border-right:1px solid rgba(255,255,255,.12);margin-right:4px}
.tb{flex:1;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;border:none;background:transparent;font-family:inherit;position:relative}
.tb-icon{font-size:18px;line-height:1;filter:grayscale(1) brightness(2) opacity(.28);transition:filter .2s,transform .15s}
.tb-label{font-size:9px;color:rgba(255,255,255,.22);font-weight:400;letter-spacing:.2px;transition:color .2s}
.tb.on .tb-icon{filter:none;transform:translateY(-1px)}
.tb.on .tb-label{color:rgba(255,255,255,.9);font-weight:600}
.tb.on::after{content:'';position:absolute;bottom:0;left:18%;right:18%;height:2.5px;background:#5ba3f5;border-radius:3px 3px 0 0}

/* ── BODY ── */
.body{padding-top:54px;height:100vh;overflow:hidden}
.view{display:none;height:100%;flex-direction:column;overflow:hidden}
.view.on{display:flex}

/* ── 칸반 툴바 ── */
.kb-toolbar{background:var(--white);border-bottom:1px solid var(--border);padding:7px 12px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.tv-wrap{display:flex;gap:3px}
.tv{padding:5px 12px;border-radius:6px;font-size:12px;color:var(--sub);cursor:pointer;background:none;border:none;font-family:inherit}
.tv.on{background:var(--bg);color:var(--text);font-weight:600}

/* ── 담당자 버튼 ── */
.pf-bar{background:var(--white);border-bottom:1px solid var(--border);padding:0 12px;height:38px;display:flex;align-items:center;gap:8px;flex-shrink:0}
.pf-btn{display:flex;align-items:center;gap:6px;padding:5px 12px 5px 8px;border:1px solid var(--border);border-radius:20px;background:var(--white);cursor:pointer;font-family:inherit;font-size:12px;color:var(--text);transition:all .15s}
.pf-btn:hover{border-color:var(--blue)}
.pf-btn.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.pf-avatar{width:20px;height:20px;border-radius:50%;background:var(--blue-lt);color:var(--blue);font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pf-btn.on .pf-avatar{background:rgba(255,255,255,.2);color:#fff}

/* ── 조직도 모달 ── */
.org-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:90;display:none}
.org-bg.on{display:block}
.org-panel{position:fixed;top:0;left:0;bottom:0;width:280px;background:var(--white);z-index:91;overflow-y:auto;box-shadow:4px 0 20px rgba(0,0,0,.15);transform:translateX(-100%);transition:transform .25s}
.org-panel.on{transform:translateX(0)}
.org-head{padding:14px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--white);z-index:1}
.org-title{font-size:14px;font-weight:700}
.org-close{font-size:22px;cursor:pointer;color:var(--sub);background:none;border:none;font-family:inherit;line-height:1}
.org-body{padding:12px}
.org-all{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;background:var(--white);cursor:pointer;font-family:inherit;font-size:13px;font-weight:500;color:var(--sub);margin-bottom:12px;transition:all .15s;text-align:left;display:flex;align-items:center;gap:8px}
.org-all:hover{border-color:var(--blue)}
.org-all.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.org-team{margin-bottom:14px}
.org-team-label{font-size:10px;font-weight:700;letter-spacing:.8px;margin-bottom:7px;padding:0 2px}
.org-members{display:flex;flex-wrap:wrap;gap:5px}
.org-mbtn{display:flex;align-items:center;gap:6px;padding:6px 10px;border:1px solid var(--border);border-radius:9px;cursor:pointer;background:var(--white);font-family:inherit;transition:all .15s}
.org-mbtn:hover{border-color:var(--blue);background:var(--blue-lt)}
.org-mbtn.on{background:var(--navy);border-color:var(--navy)}
.org-av{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;flex-shrink:0}
.org-mname{font-size:12px;font-weight:500;color:var(--text)}
.org-mrole{font-size:10px;color:var(--sub)}
.org-mbtn.on .org-mname,.org-mbtn.on .org-mrole{color:#fff}

/* ── 분류 사이드바 ── */
.kb-wrap{flex:1;display:flex;overflow:hidden;min-height:0}
.cat-sidebar{width:50px;flex-shrink:0;background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:6px 0;gap:3px}
.csb{width:44px;padding:7px 3px;border:none;border-radius:8px;background:transparent;cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:center;gap:2px;position:relative;transition:background .15s}
.csb:hover{background:var(--bg)}
.csb.on{background:#eef4fd}
.csb.on::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:3px;border-radius:0 2px 2px 0;background:var(--blue)}
.csb[data-c="인쇄"].on::before{background:var(--c인쇄)}
.csb[data-c="인테리어"].on::before{background:var(--c인테리어)}
.csb[data-c="사인물"].on::before{background:var(--c사인물)}
.csb[data-c="행사"].on::before{background:var(--c행사)}
.csb-icon{font-size:15px;line-height:1}
.csb-label{font-size:8px;color:var(--sub);text-align:center;font-weight:400}
.csb.on .csb-label{font-weight:700;color:var(--navy)}
.csb[data-c="인쇄"].on .csb-label{color:var(--c인쇄)}
.csb[data-c="인테리어"].on .csb-label{color:var(--c인테리어)}
.csb[data-c="사인물"].on .csb-label{color:var(--c사인물)}
.csb[data-c="행사"].on .csb-label{color:var(--c행사)}
.csb-cnt{font-size:9px;font-weight:600;padding:1px 4px;border-radius:8px;background:var(--bg);color:var(--sub);min-width:16px;text-align:center}
.csb-div{width:28px;height:1px;background:var(--border);flex-shrink:0;margin:2px 0}

/* ── 칸반 보드 ── */
.kanban{flex:1;overflow-x:auto;overflow-y:hidden;display:flex;align-items:flex-start;padding:10px 10px 16px;gap:8px;-webkit-overflow-scrolling:touch;scrollbar-width:thin}
.kanban::-webkit-scrollbar{height:4px}
.kanban::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.kb-col{flex:0 0 192px;display:flex;flex-direction:column;background:#eeeeed;border-radius:10px;overflow:hidden;max-height:calc(100vh - 170px)}
.kb-head{padding:8px 10px 7px;display:flex;align-items:center;gap:6px;flex-shrink:0}
.kb-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.kb-title{font-size:12px;font-weight:700;color:var(--text)}
.kb-cnt{font-size:11px;color:var(--sub);margin-left:auto;background:rgba(0,0,0,.07);padding:1px 7px;border-radius:10px}
.kb-body{flex:1;overflow-y:auto;padding:3px 6px 6px;display:flex;flex-direction:column;gap:5px;scrollbar-width:none}
.kb-body::-webkit-scrollbar{display:none}
.kb-add{flex-shrink:0;padding:7px 10px;margin:0 6px 6px;border-radius:6px;font-size:11px;color:var(--sub);cursor:pointer;background:none;border:none;font-family:inherit;text-align:left}
.kb-add:hover{background:rgba(0,0,0,.05);color:var(--text)}

/* 분류 그룹 헤더 */
.cat-grp{display:flex;align-items:center;gap:5px;padding:6px 4px 2px;flex-shrink:0}
.cat-grp:first-child{padding-top:2px}
.cat-grp-label{font-size:9px;font-weight:700;letter-spacing:.5px;white-space:nowrap}
.cat-grp-line{flex:1;height:1.5px;border-radius:1px;opacity:.35}

/* 칸반 카드 */
.kb-card{background:var(--white);border-radius:8px;padding:9px 10px;border:1px solid var(--border);cursor:pointer;transition:box-shadow .15s,transform .1s}
.kb-card:hover{box-shadow:0 2px 10px rgba(0,0,0,.1);transform:translateY(-1px)}
.kb-catbar{height:3px;border-radius:2px;margin-bottom:6px}
.kb-school{font-size:9px;color:var(--sub);margin-bottom:2px}
.kb-name{font-size:12px;font-weight:600;color:var(--text);line-height:1.4;margin-bottom:3px;word-break:keep-all}
.kb-subitems{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:4px}
.kb-sub-chip{font-size:9px;padding:2px 6px;border-radius:6px;background:#f3f4f6;color:var(--sub);font-weight:500}
.kb-sub-chip.done{background:var(--green-lt);color:var(--green);text-decoration:line-through;opacity:.65}
.kb-memo{font-size:10px;color:var(--sub);line-height:1.5;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.kb-foot{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.kb-owner{font-size:9px;padding:2px 6px;border-radius:8px;font-weight:500;white-space:nowrap}
.kb-due{font-size:9px;padding:2px 6px;border-radius:8px;font-weight:500;white-space:nowrap}

/* ── 목록 뷰 ── */
.list-scroll{flex:1;overflow-y:auto;padding:10px 12px}
.lv-item{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:6px;display:flex;gap:10px;align-items:flex-start}
.lv-bar{width:4px;min-height:28px;border-radius:2px;flex-shrink:0;margin-top:2px}
.lv-body{flex:1;min-width:0}
.lv-school{font-size:10px;color:var(--sub);margin-bottom:2px}
.lv-top{display:flex;gap:5px;margin-bottom:3px;flex-wrap:wrap;align-items:center}
.lv-name{font-size:13px;font-weight:600;color:var(--text);line-height:1.3}
.lv-subitems{display:flex;flex-wrap:wrap;gap:3px;margin-top:3px}
.lv-memo{font-size:11px;color:var(--sub);margin-top:2px;line-height:1.5}
.lv-meta{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap;align-items:center}
.lv-right{display:flex;flex-direction:column;gap:4px;flex-shrink:0}
.st-sel{font-size:10px;padding:4px 5px;border:1px solid var(--border);border-radius:6px;font-family:inherit;background:var(--white);outline:none;max-width:82px;cursor:pointer;color:var(--text)}
.act-row{display:flex;gap:3px}

/* ── STATUS ── */
.st-chip{display:inline-flex;align-items:center;gap:3px;font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;white-space:nowrap}
.st-chip::before{content:'';width:5px;height:5px;border-radius:50%;flex-shrink:0}
.st-0{background:#f3f4f6;color:#6b7280}.st-0::before{background:#9ca3af}
.st-1{background:#dbeafe;color:#1d4ed8}.st-1::before{background:#3b82f6}
.st-2{background:#fef3c7;color:#b45309}.st-2::before{background:#f59e0b}
.st-3{background:#ede9fe;color:#6d28d9}.st-3::before{background:#8b5cf6}
.st-4{background:#d1fae5;color:#065f46}.st-4::before{background:#10b981}
.st-5{background:#fee2e2;color:#991b1b}.st-5::before{background:#ef4444}
.st-6{background:#cffafe;color:#0e7490}.st-6::before{background:#06b6d4}

/* 분류 뱃지 */
.cat-badge{display:inline-flex;font-size:9px;font-weight:600;padding:2px 7px;border-radius:8px;white-space:nowrap}
.cb-인쇄{background:var(--bg인쇄);color:var(--c인쇄)}
.cb-인테리어{background:var(--bg인테리어);color:var(--c인테리어)}
.cb-사인물{background:var(--bg사인물);color:var(--c사인물)}
.cb-행사{background:var(--bg행사);color:var(--c행사)}

/* ── 캘린더 ── */
#v-cal{overflow-y:auto;padding:14px}
.cal-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.cal-nav-title{font-size:17px;font-weight:700}
.cal-nav-btn{width:30px;height:30px;border:1px solid var(--border);border-radius:7px;background:var(--white);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dh{text-align:center;font-size:10px;color:var(--sub);padding:3px 0;font-weight:500}
.cal-dh:first-child{color:#ef4444}.cal-dh:last-child{color:#3b82f6}
.cal-cell{min-height:62px;border-radius:7px;padding:4px;cursor:pointer;background:var(--white);border:1px solid var(--border)}
.cal-cell:hover{background:var(--blue-lt)}
.cal-cell.today{border:2px solid var(--blue)}
.cal-cell.selected{background:#EBF5FF;border:2px solid var(--blue)}
.cal-cell.other{opacity:.3}
.cal-cell.sunday .cal-num{color:#ef4444}
.cal-cell.saturday .cal-num{color:#3b82f6}
.cal-num{font-size:12px;font-weight:600;line-height:1;margin-bottom:3px}
.cal-chip{font-size:9px;padding:1px 4px;border-radius:3px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;line-height:1.4}
.cal-detail{margin-top:12px}
.cal-detail-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.cal-detail-title{font-size:14px;font-weight:700}
.cal-work-item{background:var(--white);border:1px solid var(--border);border-left:4px solid var(--blue);border-radius:8px;padding:10px 12px;margin-bottom:5px;cursor:pointer}
.cal-work-item:hover{box-shadow:0 2px 8px rgba(0,0,0,.07)}
.cwi-school{font-size:10px;color:var(--sub);margin-bottom:2px}
.cwi-name{font-size:13px;font-weight:600;margin-bottom:4px}
.cwi-foot{display:flex;gap:5px;flex-wrap:wrap;align-items:center}
.di{background:var(--white);border:1px solid var(--border);border-radius:9px;padding:9px 11px;margin-bottom:5px;display:flex;align-items:flex-start;gap:8px}
.di.done{opacity:.4}
.dchk{width:20px;height:20px;border:2px solid var(--border);border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;background:var(--white)}
.dchk.on{background:var(--blue);border-color:var(--blue)}
.dbody{flex:1;min-width:0}
.dtop{display:flex;gap:5px;margin-bottom:3px;flex-wrap:wrap;align-items:center}
.dperson{font-size:10px;padding:2px 7px;border-radius:8px;font-weight:500;white-space:nowrap}
.dname{font-size:12px;font-weight:600}
.ddetail{font-size:11px;color:var(--sub);line-height:1.6}
.ddel{padding:3px 7px;border:1px solid var(--border);border-radius:5px;font-size:10px;color:var(--sub);cursor:pointer;background:none;font-family:inherit;flex-shrink:0}

/* ── 대시보드 ── */
#v-dash{overflow-y:auto;padding:14px}
.dash-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.dg{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.dg-n{font-size:26px;font-weight:700;color:var(--blue);line-height:1}
.dg-l{font-size:10px;color:var(--sub);margin-top:3px}
.card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:10px}
.card-title{font-size:13px;font-weight:600;margin-bottom:10px}
.prog-wrap{margin-bottom:8px}
.prog-label{display:flex;justify-content:space-between;font-size:11px;margin-bottom:3px;color:var(--sub)}
.prog-bar{height:6px;background:#e5e7eb;border-radius:3px;overflow:hidden}
.prog-fill{height:100%;background:var(--blue);border-radius:3px;transition:width .5s}
.slabel{font-size:11px;color:var(--sub);letter-spacing:.5px;margin:12px 0 7px;font-weight:500}
.dash-mini{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:8px 11px;margin-bottom:5px;cursor:pointer}
.dash-mini-top{display:flex;align-items:center;gap:6px;flex-wrap:wrap}

/* ── 공지문 ── */
#v-notice{overflow-y:auto;padding:14px}
.notice-box{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:16px;font-size:13px;line-height:2.1;white-space:pre-wrap;color:var(--text);min-height:120px;font-family:inherit;word-break:break-all}
.copy-btn{padding:9px 22px;background:var(--blue);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
.copy-btn.done{background:var(--green)}

/* ── 공통 ── */
.btn{padding:9px 16px;border:none;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
.btn-primary{background:var(--blue);color:#fff}
.btn-outline{background:var(--white);color:var(--text);border:1px solid var(--border)}
.btn-danger{background:var(--red-lt);color:var(--red);border:1px solid #fca5a5}
.btn-sm{padding:5px 10px;font-size:11px;border-radius:6px}
.btn-full{width:100%}
.empty{text-align:center;padding:28px 16px;color:var(--sub);font-size:12px;line-height:2}

/* ── 모달 ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:80;display:none;align-items:flex-end;justify-content:center}
.modal-bg.on{display:flex}
.modal{background:var(--white);border-radius:20px 20px 0 0;padding:0;width:100%;max-width:560px;max-height:94vh;overflow-y:auto}
.modal-head{position:sticky;top:0;z-index:2;background:var(--white);padding:16px 18px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.modal-head-title{font-size:16px;font-weight:700}
.modal-close{font-size:22px;cursor:pointer;color:var(--sub);background:none;border:none;font-family:inherit;line-height:1;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px}
.modal-close:hover{background:var(--bg)}
.form-wrap{padding:0 18px}
.fsec{margin-top:20px}
.fsec-title{font-size:10px;font-weight:600;color:var(--sub);letter-spacing:1.5px;margin-bottom:10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.ff{display:flex;flex-direction:column;gap:4px;margin-bottom:13px}
.ff label{font-size:12px;color:var(--text);font-weight:500}
.ff input,.ff select,.ff textarea{padding:11px 13px;border:1.5px solid var(--border);border-radius:10px;font-size:13px;font-family:inherit;color:var(--text);background:var(--white);outline:none;-webkit-appearance:none;transition:border-color .15s}
.ff input:focus,.ff select:focus,.ff textarea:focus{border-color:var(--blue)}
.ff textarea{resize:vertical;min-height:72px;line-height:1.7}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-foot{padding:14px 18px 0;display:flex;gap:10px}

/* 분류 선택 */
.cat-selector{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px}
.cat-opt{padding:9px 4px;border:1.5px solid var(--border);border-radius:10px;text-align:center;cursor:pointer;font-size:11px;font-weight:500;color:var(--sub);transition:all .15s;background:var(--white)}
.cat-opt:hover{background:var(--bg)}
.cat-opt.sel-인쇄{border-color:var(--c인쇄);background:var(--bg인쇄);color:var(--c인쇄)}
.cat-opt.sel-인테리어{border-color:var(--c인테리어);background:var(--bg인테리어);color:var(--c인테리어)}
.cat-opt.sel-사인물{border-color:var(--c사인물);background:var(--bg사인물);color:var(--c사인물)}
.cat-opt.sel-행사{border-color:var(--c행사);background:var(--bg행사);color:var(--c행사)}

/* 행사 하위품목 */
.sub-quick{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.sub-qbtn{padding:4px 10px;border:1px solid var(--border);border-radius:20px;font-size:11px;cursor:pointer;background:var(--white);color:var(--sub);font-family:inherit}
.sub-qbtn:hover{border-color:var(--c행사);color:var(--c행사)}
.sub-list{display:flex;flex-direction:column;gap:5px;margin-bottom:8px}
.sub-row{display:flex;align-items:center;gap:7px;background:var(--bg);border-radius:8px;padding:6px 10px}
.sub-chk{width:18px;height:18px;border:2px solid var(--border);border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--white)}
.sub-chk.on{background:var(--green);border-color:var(--green)}
.sub-nm{flex:1;font-size:12px;font-weight:500;color:var(--text)}
.sub-st{font-size:10px;padding:3px 5px;border:1px solid var(--border);border-radius:6px;font-family:inherit;background:var(--white);cursor:pointer;color:var(--sub);max-width:76px}
.sub-del{font-size:18px;color:var(--sub);cursor:pointer;background:none;border:none;padding:0;line-height:1;flex-shrink:0}
.sub-add-row{display:flex;gap:6px}
.sub-add-input{flex:1;padding:8px 11px;border:1.5px dashed var(--border);border-radius:8px;font-size:12px;font-family:inherit;color:var(--text);background:var(--white);outline:none}
.sub-add-input:focus{border-color:var(--c행사);border-style:solid}
.sub-add-btn{padding:8px 14px;background:var(--c행사);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;font-family:inherit}

/* 배송 추가 모달 */
.del-modal .form-wrap{padding:0 18px}

/* PERSON COLORS */
.pc0{background:#dbeafe;color:#1d4ed8}.pc1{background:#d1fae5;color:#065f46}
.pc2{background:#fef3c7;color:#b45309}.pc3{background:#ede9fe;color:#7c3aed}
.pc4{background:#fee2e2;color:#991b1b}.pc5{background:#cffafe;color:#0e7490}
.pc6{background:#fce7f3;color:#9d174d}.pc7{background:#fef9c3;color:#854d0e}

/* ── 상담기록 ── */
#v-crm{overflow-y:auto;padding:12px}
.crm-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.crm-search{flex:1;padding:9px 13px 9px 36px;border:1px solid var(--border);border-radius:20px;font-size:13px;font-family:inherit;color:var(--text);background:var(--white);outline:none}
.crm-search-wrap{position:relative;flex:1}
.crm-search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none}
/* 거래처 카드 */
.client-card{background:var(--white);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden;cursor:pointer;transition:box-shadow .15s}
.client-card:hover{box-shadow:0 2px 10px rgba(0,0,0,.08)}
.client-head{padding:12px 14px;display:flex;align-items:center;gap:10px}
.client-avatar{width:38px;height:38px;border-radius:10px;background:var(--blue-lt);color:var(--blue);font-size:15px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.client-info{flex:1;min-width:0}
.client-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:2px}

.client-badges{display:flex;gap:5px;flex-wrap:wrap;margin-top:4px}
.client-badge{font-size:9px;padding:2px 7px;border-radius:8px;font-weight:500}
.client-actions{display:flex;gap:6px;flex-shrink:0}
/* 상담 기록 리스트 */
.consult-list{border-top:1px solid var(--border);padding:0 14px 8px}
.consult-item{padding:10px 0;border-bottom:1px solid var(--border);display:flex;gap:10px;align-items:flex-start}
.consult-item:last-child{border-bottom:none}
.consult-date{font-size:10px;color:var(--sub);white-space:nowrap;margin-top:2px;min-width:56px}
.consult-body{flex:1;min-width:0}
.consult-content{font-size:12px;color:var(--text);line-height:1.6;margin-bottom:4px}
.consult-tags{display:flex;gap:4px;flex-wrap:wrap}
.consult-tag{font-size:9px;padding:2px 7px;border-radius:8px;background:var(--bg);color:var(--sub);font-weight:500}
.consult-tag.assigned{background:var(--green-lt);color:var(--green)}
.consult-actions{display:flex;flex-direction:column;gap:4px;flex-shrink:0}
/* 상담 입력 폼 */
.consult-quick{background:var(--bg);border-radius:10px;padding:10px 12px;margin-bottom:10px}
.consult-quick-title{font-size:11px;font-weight:600;color:var(--sub);margin-bottom:8px;letter-spacing:.5px}
.consult-quick-input{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:13px;font-family:inherit;color:var(--text);background:var(--white);outline:none;resize:none;line-height:1.6}
.consult-quick-input:focus{border-color:var(--blue)}
.consult-quick-foot{display:flex;align-items:center;gap:8px;margin-top:8px}
/* 거래처 상세 모달 */
.client-detail-head{padding:16px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px}
.client-detail-avatar{width:44px;height:44px;border-radius:12px;background:var(--blue-lt);color:var(--blue);font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
/* 배정 버튼 */
.assign-btn{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;background:var(--blue-lt);color:var(--blue);border:1px solid #bfdbfe;border-radius:8px;font-size:11px;font-weight:500;cursor:pointer;font-family:inherit;white-space:nowrap}
.assign-btn:hover{background:var(--blue);color:#fff;border-color:var(--blue)}

</style>
</head>
<body>

<!-- 상단 탭바 -->
<div class="topbar">
  <div class="topbar-logo">S;D</div>
  <button class="tb on" onclick="sw('kanban',this)"><span class="tb-icon">📋</span><span class="tb-label">작업</span></button>
  <button class="tb" onclick="sw('cal',this)"><span class="tb-icon">📅</span><span class="tb-label">배송달력</span></button>

</div>

<div class="body">

  <!-- 작업 칸반 -->
  <div class="view on" id="v-kanban">
    <div class="kb-toolbar">
      <div class="tv-wrap">
        <button class="tv on" id="tv-k" onclick="setWV('kanban',this)">⊞ 칸반</button>
        <button class="tv" id="tv-l" onclick="setWV('list',this)">≡ 목록</button>
      </div>

        <button class="csb" data-c="인쇄" onclick="selCat(this)"><span class="csb-icon">🖨</span><span class="csb-label">인쇄</span><span class="csb-cnt" id="cc-인쇄">0</span></button>
        <button class="csb" data-c="인테리어" onclick="selCat(this)"><span class="csb-icon">🏫</span><span class="csb-label">인테리어</span><span class="csb-cnt" id="cc-인테리어">0</span></button>
        <button class="csb" data-c="사인물" onclick="selCat(this)"><span class="csb-icon">🪧</span><span class="csb-label">사인물</span><span class="csb-cnt" id="cc-사인물">0</span></button>
        <button class="csb" data-c="행사" onclick="selCat(this)"><span class="csb-icon">🎪</span><span class="csb-label">행사</span><span class="csb-cnt" id="cc-행사">0</span></button>

      <div class="list-scroll" id="list-body" style="display:none"></div>
    </div>
  </div>

  <!-- 배송달력 -->
  <div class="view" id="v-cal">

      <button class="cal-nav-btn" onclick="moveMonth(-1)">‹</button>
      <span class="cal-nav-title" id="cal-title"></span>
      <button class="cal-nav-btn" onclick="moveMonth(1)">›</button>
    </div>

    <div class="cal-grid" id="cal-cells" style="margin-top:2px"></div>

  </div>

  <!-- 대시보드 -->

      <div class="dg"><div class="dg-n" id="d-total">0</div><div class="dg-l">전체</div></div>
      <div class="dg"><div class="dg-n" id="d-ing" style="color:var(--amber)">0</div><div class="dg-l">진행중</div></div>
      <div class="dg"><div class="dg-n" id="d-done" style="color:var(--green)">0</div><div class="dg-l">완료</div></div>
    </div>
    <div class="card"><div class="card-title">📊 팀별 진행 현황</div><div id="team-prog"></div></div>
    <div class="slabel">📦 오늘 배송</div><div id="dash-del"></div>

    <div style="font-size:11px;color:var(--sub);margin-top:8px;text-align:center">복사 후 카카오톡에 바로 붙여넣기</div>
  </div>


  <!-- 상담기록 -->

      <div class="crm-search-wrap">

        <input class="crm-search" id="crm-search" placeholder="거래처명 검색..." oninput="renderCrm()">

      <button class="btn btn-primary btn-sm" onclick="openAddClient()">+ 거래처</button>

    <div id="crm-list"></div>

</div>

function fmtD(s){if(!s)return '';var d=new Date(s),w=['일','월','화','수','목','금','토'];return(d.getMonth()+1)+'/'+d.getDate()+'('+w[d.getDay()]+')';}
function diff(s){if(!s)return null;return Math.ceil((new Date(s)-new Date(todayStr()))/(864e5));}

      subs:[{id:uid(),n:'포스터',s:2,done:false},{id:uid(),n:'초대장',s:0,done:false},{id:uid(),n:'자이언트배너',s:0,done:false},{id:uid(),n:'음향',s:1,done:false},{id:uid(),n:'포토월',s:0,done:false}]},

function openOrg(){
  var body=document.getElementById('org-body'); body.innerHTML='';

// ── 분류 사이드바 ──
function selCat(el){
  catF=el.dataset.c;
  document.querySelectorAll('.csb').forEach(function(b){b.classList.remove('on');});
  el.classList.add('on');
  renderKanban(); renderList(); updateCnts();
}
function updateCnts(){
  if(!works)return;
  document.getElementById('cc-전체').textContent=works.length;
  ['인쇄','인테리어','사인물','행사'].forEach(function(c){
    var el=document.getElementById('cc-'+c); if(!el)return;
    el.textContent=works.filter(function(w){return w.cat===c;}).length;
  });
}

// ── 칸반 ──
function getF(){
  if(!works)return [];
  return works.filter(function(w){
    if(personF!=='전체'&&w.p!==personF)return false;
    if(catF!=='전체'&&w.cat!==catF)return false;
    return true;
  });
}

function renderKanban(){
  var board=document.getElementById('kanban-board'); board.innerHTML='';
  var f=getF();
  STAGES.forEach(function(st,si){
    var all=f.filter(function(w){return w.s===si;});
    var col=document.createElement('div'); col.className='kb-col';
    col.innerHTML='<div class="kb-head"><div class="kb-dot" style="background:'+SDOTS[si]+'"></div><span class="kb-title">'+st+'</span><span class="kb-cnt">'+all.length+'</span></div>';
    var body=document.createElement('div'); body.className='kb-body';
    if(catF==='전체'){
      var any=false;
      CAT_LIST.forEach(function(cat){
        var cc=all.filter(function(w){return w.cat===cat.k;});
        if(!cc.length)return;
        var grp=document.createElement('div'); grp.className='cat-grp';
        grp.innerHTML='<span class="cat-grp-label" style="color:'+cat.c+'">'+cat.i+' '+cat.k+'</span><div class="cat-grp-line" style="background:'+cat.c+'"></div>';
        body.appendChild(grp);
        cc.forEach(function(w){body.appendChild(mkCard(w));});
        any=true;
      });
      var nc=all.filter(function(w){return !w.cat;});
      if(nc.length){if(any){var g2=document.createElement('div');g2.className='cat-grp';g2.innerHTML='<span class="cat-grp-label" style="color:#9ca3af">기타</span><div class="cat-grp-line" style="background:#9ca3af"></div>';body.appendChild(g2);}nc.forEach(function(w){body.appendChild(mkCard(w));});any=true;}
      if(!any){var em=document.createElement('div');em.style='font-size:11px;color:#c0bfbb;text-align:center;padding:14px 0';em.textContent='없음';body.appendChild(em);}
    } else {
      if(!all.length){var em=document.createElement('div');em.style='font-size:11px;color:#c0bfbb;text-align:center;padding:14px 0';em.textContent='없음';body.appendChild(em);}
      all.forEach(function(w){body.appendChild(mkCard(w));});
    }
    col.appendChild(body);
    var ab=document.createElement('button'); ab.className='kb-add'; ab.textContent='+ 새 항목';
    ab.onclick=function(){openAddWork(si);}; col.appendChild(ab);
    board.appendChild(col);
  });
}

function mkCard(w){
  var card=document.createElement('div'); card.className='kb-card';
  var d=diff(w.due);
  var dueHtml='';
  if(w.due){
    var bg=d<0?'#fee2e2':d<=2?'#fef3c7':'#d1fae5', tc=d<0?'#991b1b':d<=2?'#b45309':'#065f46';
    var dl=d<0?'D+'+Math.abs(d)+' 지연':d===0?'오늘':d===1?'내일':'D-'+d;
    dueHtml='<span class="kb-due" style="background:'+bg+';color:'+tc+'">📅 '+fmtD(w.due)+' '+dl+'</span>';
  } else dueHtml='<span class="kb-due" style="background:#fef3c7;color:#b45309">배송일 미지정</span>';
  var subsHtml='';
  if(w.cat==='행사'&&w.subs&&w.subs.length){
    subsHtml='<div class="kb-subitems">';
    w.subs.forEach(function(s){subsHtml+='<span class="kb-sub-chip'+(s.done?' done':'')+'">'+esc(s.n)+'</span>';});
    subsHtml+='</div>';
  }
  card.innerHTML='<div class="kb-catbar" style="background:'+catC(w.cat)+'"></div>'
    +(w.school?'<div class="kb-school">🏫 '+esc(w.school)+'</div>':'')
    +'<div class="kb-name">'+esc(w.n)+'</div>'
    +subsHtml
    +(w.m?'<div class="kb-memo">'+esc(w.m)+'</div>':'')
    +'<div class="kb-foot"><span class="kb-owner '+pc(w.p)+'">'+esc(w.p)+'</span>'+dueHtml+'</div>';
  card.onclick=function(){openEditWork(w.id);}; return card;
}

// ── 목록 뷰 ──
function renderList(){
  var f=getF(); f.sort(function(a,b){return a.s-b.s;});
  var body=document.getElementById('list-body');
  if(!f.length){body.innerHTML='<div class="empty">작업이 없습니다.</div>';return;}
  body.innerHTML='';
  f.forEach(function(w){
    var stOpts=STAGES.map(function(s,si){return'<option value="'+si+'"'+(si===w.s?' selected':'')+'>'+s+'</option>';}).join('');
    var d=diff(w.due), dC=d<0?'#ef4444':d<=2?'#f59e0b':'#10b981';
    var dL=w.due?(d<0?'⚠ D+'+Math.abs(d)+' 지연':d===0?'🔴 오늘':d===1?'🟡 내일':'D-'+d):'';
    var subsHtml='';
    if(w.cat==='행사'&&w.subs&&w.subs.length){subsHtml='<div class="lv-subitems">';w.subs.forEach(function(s){subsHtml+='<span class="kb-sub-chip'+(s.done?' done':'')+'">'+esc(s.n)+'</span>';});subsHtml+='</div>';}
    var item=document.createElement('div'); item.className='lv-item';
    item.innerHTML='<div class="lv-bar" style="background:'+catC(w.cat)+'"></div>'
      +'<div class="lv-body">'
        +(w.school?'<div class="lv-school">🏫 '+esc(w.school)+'</div>':'')
        +'<div class="lv-top"><span class="st-chip '+SCLS[w.s]+'">'+STAGES[w.s]+'</span>'
          +(w.cat?'<span class="cat-badge cb-'+w.cat+'">'+w.cat+'</span>':'')
          +(w.due?'<span style="font-size:10px;color:'+dC+';font-weight:500">📅 '+fmtD(w.due)+' '+dL+'</span>'
            :'<span style="font-size:9px;background:#fef3c7;color:#b45309;padding:2px 7px;border-radius:8px;font-weight:500">배송일 미지정</span>')+'</div>'
        +'<div class="lv-name">'+esc(w.n)+'</div>'
        +subsHtml
        +(w.m?'<div class="lv-memo">'+esc(w.m)+'</div>':'')
        +'<div class="lv-meta"><span class="kb-owner '+pc(w.p)+'">'+esc(w.p)+'</span>'
          +(w.contact?'<span style="font-size:10px;color:var(--sub)">👤 '+esc(w.contact)+'</span>':'')
          +(w.tel?'<span style="font-size:10px;color:var(--sub)">📞 '+esc(w.tel)+'</span>':'')+'</div>'
      +'</div>'
      +'<div class="lv-right"><select class="st-sel" onchange="chgSt('+w.id+',this.value)">'+stOpts+'</select>'
        +'<div class="act-row"><button class="btn btn-outline btn-sm" onclick="openEditWork('+w.id+')">사양서</button>'
        +'<button class="btn btn-danger btn-sm" onclick="delWork('+w.id+')">삭제</button></div></div>';
    body.appendChild(item);
  });
}

function openEditWork(id){
  var w=works.find(function(x){return x.id===id;}); if(!w)return;
  editWorkId=id;
  document.getElementById('mw-title').textContent='제작사양서 — '+esc(w.n);
  document.getElementById('mw-btn').textContent='저장';
  document.getElementById('mw-del').style.display='';
  document.getElementById('wf-school').value=w.school||'';
  document.getElementById('wf-n').value=w.n||'';
  document.getElementById('wf-contact').value=w.contact||'';
  document.getElementById('wf-tel').value=w.tel||'';
  document.getElementById('wf-m').value=w.m||'';
  document.getElementById('wf-due').value=w.due||'';
  document.getElementById('wf-size').value=w.size||'';
  document.getElementById('wf-page').value=w.page||'';
  document.getElementById('wf-cover').value=w.cover||'';
  document.getElementById('wf-inner').value=w.inner||'';
  document.getElementById('wf-finish').value=w.finish||'';
  document.getElementById('wf-s').value=w.s;
  var sp=document.getElementById('wf-p');
  for(var i=0;i<sp.options.length;i++){if(sp.options[i].value===w.p){sp.selectedIndex=i;break;}}
  curCat=w.cat||'';
  document.querySelectorAll('.cat-opt').forEach(function(o){
    o.className='cat-opt';
    if(curCat&&o.dataset.cat===curCat) o.classList.add('sel-'+curCat);
  });
  formSubs=JSON.parse(JSON.stringify(w.subs||[]));
  document.getElementById('sec-sub').style.display=curCat==='행사'?'block':'none';
  renderSubs();
  openModal('modal-work');

function renderCal(){
  document.getElementById('cal-title').textContent=calYear+'년 '+(calMonth+1)+'월';
  var hdrs=document.getElementById('cal-hdrs'); hdrs.innerHTML='';
  ['일','월','화','수','목','금','토'].forEach(function(d,i){var el=document.createElement('div');el.className='cal-dh';el.textContent=d;if(i===0)el.style.color='#ef4444';if(i===6)el.style.color='#3b82f6';hdrs.appendChild(el);});
  var first=new Date(calYear,calMonth,1), last=new Date(calYear,calMonth+1,0);
  var cells=document.getElementById('cal-cells'); cells.innerHTML='';
  var today=todayStr();
  for(var i=0;i<first.getDay();i++){var el=document.createElement('div');el.className='cal-cell other';var pl=new Date(calYear,calMonth,0);el.innerHTML='<div class="cal-num">'+(pl.getDate()-first.getDay()+1+i)+'</div>';cells.appendChild(el);}
  for(var d=1;d<=last.getDate();d++){
    var ds=calYear+'-'+pad(calMonth+1)+'-'+pad(d);
    var dow=new Date(calYear,calMonth,d).getDay();
    var cls='cal-cell'+(ds===today?' today':'')+(ds===calSel?' selected':'')+(dow===0?' sunday':dow===6?' saturday':'');
    var dayW=works?works.filter(function(w){return w.due===ds;}):[];
    var dayD=delivery.filter(function(x){return x.date===ds;});
    var el=document.createElement('div'); el.className=cls; el.dataset.ds=ds;
    var inner='<div class="cal-num">'+d+'</div>';
    dayW.slice(0,2).forEach(function(w){inner+='<div class="cal-chip" style="background:'+catBg(w.cat)+';color:'+catC(w.cat)+'">'+(w.school?w.school+' ':'')+w.n+'</div>';});
    if(dayW.length>2)inner+='<div style="font-size:9px;color:var(--sub)">+'+(dayW.length-2)+'건</div>';
    dayD.slice(0,1).forEach(function(it){inner+='<div class="cal-chip" style="background:#dbeafe;color:#1d4ed8">🚗 '+esc(it.client)+'</div>';});
    el.innerHTML=inner;
    el.onclick=function(){calSel=this.dataset.ds;renderCal();renderCalDay();renderNotice();};
    cells.appendChild(el);
  }
  var rem=(7-((first.getDay()+last.getDate())%7))%7;
  for(var i=0;i<rem&&rem<7;i++){var el=document.createElement('div');el.className='cal-cell other';el.innerHTML='<div class="cal-num">'+(i+1)+'</div>';cells.appendChild(el);}

}

function renderDash(){
  if(!works)return;
  document.getElementById('d-total').textContent=works.length;
  document.getElementById('d-ing').textContent=works.filter(function(w){return w.s>0&&w.s<4;}).length;
  document.getElementById('d-done').textContent=works.filter(function(w){return w.s>=4;}).length;
  var tp=document.getElementById('team-prog'); tp.innerHTML='';
  TEAMS.forEach(function(team){
    var ms=MEMBERS.filter(function(m){return m.t===team;}).map(function(m){return m.n;});
    var tw=works.filter(function(w){return ms.indexOf(w.p)>=0;});
    if(!tw.length)return;
    var done=tw.filter(function(w){return w.s>=4;}).length;
    var pct=Math.round(done/tw.length*100);
    var row=document.createElement('div'); row.className='prog-wrap';
    row.innerHTML='<div class="prog-label"><span>'+team+'</span><span>'+done+'/'+tw.length+'건</span></div><div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%"></div></div>';
    tp.appendChild(row);
  });
  var dd=document.getElementById('dash-del');
  var td=delivery.filter(function(d){return d.date===todayStr()&&!d.done;});
  dd.innerHTML=!td.length?'<div class="empty" style="padding:10px">오늘 배송 없음</div>':'';
  td.forEach(function(it){var div=document.createElement('div');div.className='dash-mini';div.innerHTML='<div class="dash-mini-top"><span class="dperson '+pc(it.person)+'">'+esc(it.person)+'</span><span style="font-size:12px;font-weight:600">#'+esc(it.client)+'_'+esc(it.item)+'</span></div>';dd.appendChild(div);});
  var du=document.getElementById('dash-unsched');
  var us=works.filter(function(w){return !w.due&&w.s<5;});
  du.innerHTML=!us.length?'<div class="empty" style="padding:10px">✅ 미지정 없음</div>':'';
  us.forEach(function(w){
    var div=document.createElement('div');div.className='dash-mini';div.style='border-left:3px solid #f59e0b';
    div.innerHTML='<div class="dash-mini-top">'+(w.cat?'<span class="cat-badge cb-'+w.cat+'">'+w.cat+'</span>':'')+'<span class="kb-owner '+pc(w.p)+'">'+esc(w.p)+'</span><span style="font-size:12px;font-weight:600">'+(w.school?'['+esc(w.school)+'] ':'')+esc(w.n)+'</span></div>';
    div.onclick=function(){openEditWork(w.id);}; du.appendChild(div);
  });
}

// ── 공지문 ──
function renderNotice(){
  var items=delivery.filter(function(d){return d.date===calSel&&!d.done;});
  var ds=fmtD(calSel); document.getElementById('notice-title').textContent=ds+' 배송 공지문';
  if(!items.length){document.getElementById('notice-box').textContent='✅ '+ds+' 배송 일정 없음';return;}
  var byP={};
  items.forEach(function(it){if(!byP[it.person])byP[it.person]=[];byP[it.person].push(it);});
  var lines=[ds+' 배송 일정 공지\n'];
  Object.keys(byP).forEach(function(p){
    lines.push('── '+p+' 동선 ──');
    byP[p].forEach(function(it){var line='#'+it.client+'_'+it.item;if(it.qty)line+=' '+it.qty;if(it.tel)line+='\n'+it.tel;if(it.memo)line+='\n'+it.memo;lines.push(line);});
    lines.push('');
  });
  document.getElementById('notice-box').textContent=lines.join('\n');
}
function copyNotice(){
  var text=document.getElementById('notice-box').textContent;
  var btn=document.getElementById('copy-btn');
  var ok=function(){btn.textContent='✓ 복사됨';btn.classList.add('done');setTimeout(function(){btn.textContent='복사';btn.classList.remove('done');},2000);};
  if(navigator.clipboard){navigator.clipboard.writeText(text).then(ok).catch(function(){ok();});}else ok();
}

  body.appendChild(slbl);

  if (!clConsults.length) {
    var em = document.createElement('div'); em.className='empty'; em.style='padding:16px';
    em.textContent='상담 기록이 없습니다.'; body.appendChild(em);
  } else {
    clConsults.forEach(function(c) {
      var w = c.assignedWorkId ? works.find(function(x){return x.id===c.assignedWorkId;}) : null;
      var item = document.createElement('div'); item.className='consult-item';
      item.innerHTML =
        '<div class="consult-date">'+esc(fmtD(c.date))+'<br><span style="font-size:9px">'+esc(c.person)+'</span></div>'
        +'<div class="consult-body">'
          +'<div class="consult-content">'+esc(c.content)+'</div>'
          +'<div class="consult-tags">'
            +(c.tags||[]).map(function(t){return '<span class="consult-tag">'+esc(t)+'</span>';}).join('')
            +(w?'<span class="consult-tag assigned">✅ '+esc(w.n)+'</span>':'')
          +'</div>'
        +'</div>'
        +'<div class="consult-actions">'
          +(!w?'<button class="assign-btn" onclick="assignWork(''+c.id+'',''+cid+'')">→ 작업배정</button>':'')
          +'<button class="btn btn-danger btn-sm" style="font-size:10px;padding:4px 7px" onclick="delConsult(''+c.id+'')">삭제</button>'
        +'</div>';
      body.appendChild(item);
    });
  }
  openModal('modal-crm-detail');
}

// ── 상담 저장 ──
function saveConsult(cid) {
  var content = document.getElementById('cq-content').value.trim();
  if (!content) { alert('상담 내용을 입력하세요.'); return; }
  var person = document.getElementById('cq-person').value;
  consults.unshift({id:uid(), clientId:cid, date:todayStr(), content:content, person:person, tags:[], assignedWorkId:null, c:todayStr()});
  saveClients();
  document.getElementById('cq-content').value = '';
  openClientDetail(cid); // 새로고침
}
function delConsult(cid) {
  if (!confirm('상담 기록을 삭제할까요?')) return;
  consults = consults.filter(function(c){return c.id!==cid;});
  saveClients(); closeModal('modal-crm-detail'); renderCrm();
}

// ── 빠른 상담 입력 (목록에서) ──
function openAddConsult(cid) {
  openClientDetail(cid);
  setTimeout(function(){var el=document.getElementById('cq-content');if(el)el.focus();}, 300);
}

// ── 작업 배정 ──
function assignWork(consultId, clientId) {
  var cl = clients.find(function(c){return c.id===clientId;});
  if (!cl) return;
  var consult = consults.find(function(c){return c.id===consultId;});
  if (!consult) return;

  // 제작사양서 모달 열기 (거래처 정보 자동 입력)
  openAddWork(0);
  setTimeout(function() {
    document.getElementById('wf-school').value = cl.name;
    document.getElementById('wf-contact').value = cl.contact || '';
    document.getElementById('wf-tel').value = cl.tel || '';
    // 상담 내용을 메모에 자동 입력
    document.getElementById('wf-m').value = '[상담기록] ' + consult.content;
    document.getElementById('mw-title').textContent = '제작사양서 — 작업배정 (' + cl.name + ')';
    // 저장 후 상담기록에 연결
    var origSave = window._origSaveWork;
    window._pendingAssign = {consultId: consultId, clientId: clientId};
  }, 100);

  closeModal('modal-crm-detail');
}

// saveWork 후 상담기록 연결 처리
var _origSaveWork = null;
(function patchSaveWork() {
  var orig = window.saveWork;
  window.saveWork = function() {
    orig();
    if (window._pendingAssign) {
      var pa = window._pendingAssign;
      var c = consults.find(function(x){return x.id===pa.consultId;});
      if (c && works.length > 0) {
        c.assignedWorkId = works[0].id; // 방금 추가된 작업
        saveClients();
      }
      window._pendingAssign = null;
    }
  };
})();

// ── 거래처 추가/수정 ──
function openAddClient() {
  editClientId = null;
  document.getElementById('mc-title').textContent = '거래처 추가';
  document.getElementById('mc-btn').textContent = '추가하기';
  document.getElementById('mc-del').style.display = 'none';
  ['cf-name','cf-contact','cf-tel','cf-email','cf-addr','cf-memo'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('cf-type').value = '';
  openModal('modal-client');
}
function openEditClient(cid) {
  var cl = clients.find(function(c){return c.id===cid;}); if(!cl)return;
  editClientId = cid;
  document.getElementById('mc-title').textContent = '거래처 수정';
  document.getElementById('mc-btn').textContent = '저장';
  document.getElementById('mc-del').style.display = '';
  document.getElementById('cf-name').value = cl.name||'';
  document.getElementById('cf-contact').value = cl.contact||'';
  document.getElementById('cf-tel').value = cl.tel||'';
  document.getElementById('cf-email').value = cl.email||'';
  document.getElementById('cf-addr').value = cl.addr||'';
  document.getElementById('cf-memo').value = cl.memo||'';
  document.getElementById('cf-type').value = cl.type||'';
  closeModal('modal-crm-detail');
  openModal('modal-client');
}
function saveClient() {
  var name = document.getElementById('cf-name').value.trim();
  if (!name) { alert('거래처명을 입력하세요.'); return; }
  var data = {name:name, contact:document.getElementById('cf-contact').value.trim(),
    tel:document.getElementById('cf-tel').value.trim(), email:document.getElementById('cf-email').value.trim(),
    addr:document.getElementById('cf-addr').value.trim(), type:document.getElementById('cf-type').value,
    memo:document.getElementById('cf-memo').value.trim()};
  if (editClientId) {
    var cl = clients.find(function(c){return c.id===editClientId;}); if(cl) Object.assign(cl, data);
  } else {
    clients.unshift(Object.assign({id:uid(), c:todayStr()}, data));
  }
  saveClients(); closeModal('modal-client'); renderCrm();
}
function delClientCur() {
  if (!confirm('거래처를 삭제할까요? 상담기록도 모두 삭제됩니다.')) return;
  clients = clients.filter(function(c){return c.id!==editClientId;});
  consults = consults.filter(function(c){return c.clientId!==editClientId;});
  saveClients(); closeModal('modal-client'); renderCrm();
}

// ── 뷰 전환 ──
function sw(id,el){
  curTab=id;
  document.querySelectorAll('.view').forEach(function(v){v.classList.remove('on');v.style.display='none';});
  document.querySelectorAll('.tb').forEach(function(b){b.classList.remove('on');});
  var v=document.getElementById('v-'+id); v.classList.add('on'); v.style.display='flex';
  if(el)el.classList.add('on');
  var tvw=document.querySelector('.tv-wrap'); if(tvw)tvw.style.display=id==='kanban'?'flex':'none';
  if(id==='cal')renderCal();
  if(id==='crm'){renderCrm();}
  if(id==='dash')renderDash();
  if(id==='notice')renderNotice();
}

function openModal(id){document.getElementById(id).classList.add('on');}
function closeModal(id){document.getElementById(id).classList.remove('on');}
document.querySelectorAll('.modal-bg').forEach(function(bg){bg.addEventListener('click',function(e){if(e.target===this)this.classList.remove('on');});});
</script>
